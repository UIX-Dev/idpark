<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 470" role="img" aria-label="파크데이 심볼">
  <!-- PARKDAY 심볼 · 브랜드 마크 컬러 규정 준수 (딥포레스트 #0B3D2E 상단 + 라임 #A8E063 하단 + 크림 #FAF7EC 깃발) -->
  <!-- 라임 마운드 (하단) -->
  <ellipse cx="238" cy="372" rx="170" ry="92" fill="#A8E063"/>
  <!-- 딥포레스트 스템 (상단) -->
  <rect x="110" y="70" width="68" height="300" rx="16" fill="#0B3D2E"/>
  <!-- 라임으로 스템 하단을 덮어 두 톤 분할 -->
  <rect x="110" y="300" width="68" height="70" fill="#A8E063"/>
  <!-- 딥포레스트 보울 (링 — 카운터 투명) -->
  <path fill="#0B3D2E" fill-rule="evenodd"
        d="M105 175 a100 100 0 1 0 200 0 a100 100 0 1 0 -200 0 Z
           M124 168 a46 46 0 1 1 92 0 a46 46 0 1 1 -92 0 Z"/>
  <!-- 크림 홀컵 -->
  <ellipse cx="214" cy="372" rx="52" ry="20" fill="#FAF7EC"/>
  <!-- 크림 깃대 -->
  <rect x="207" y="118" width="15" height="254" rx="5" fill="#FAF7EC"/>
  <!-- 크림 깃발 -->
  <polygon points="222,128 222,182 284,155" fill="#FAF7EC"/>
</svg>
