<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="PARKDAY symbol">
  <title>PARKDAY</title>
  <defs>
    <!-- P/골프그린 글리프: 곧은 왼쪽 기둥 + 직각에 가까운 좌상단 + 넓고 둥근 오른쪽 -->
    <path id="pd-glyph" d="M338 224
      L578 224
      C720 224 808 352 808 512
      C808 692 714 826 542 826
      L338 826
      Q320 826 320 808
      L320 242
      Q320 224 338 224
      Z"/>
    <clipPath id="pd-clip"><use href="#pd-glyph"/></clipPath>
  </defs>

  <!-- 바탕: 라임(하단 그린) -->
  <use href="#pd-glyph" fill="#A8E063"/>
  <!-- 상단: 딥그린 (실루엣 클립 안에서 사선 분할) -->
  <g clip-path="url(#pd-clip)">
    <polygon points="300,200 860,200 860,502 300,560" fill="#0B3D2E"/>
  </g>

  <!-- 골프 깃발 + 홀컵 (크림) -->
  <g fill="#FAF7EC">
    <ellipse cx="506" cy="715" rx="132" ry="46"/>
    <rect x="490" y="326" width="30" height="389" rx="14"/>
    <path d="M520 334 L702 405 L520 477 Z"/>
  </g>
</svg>
